apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
{{- range .Values.secretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "binarylane-controller.fullname" $ }}-secrets
  namespace: {{ . }}
  labels:
    {{- include "binarylane-controller.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
{{- end }}
