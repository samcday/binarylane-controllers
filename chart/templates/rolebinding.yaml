apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "binarylane-controller.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "binarylane-controller.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
