{{- if .Values.vipManager.enabled }}
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-vip
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: vip-manager
spec:
  selector:
    matchLabels:
      {{- include "binarylane-controller.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: vip-manager
  template:
    metadata:
      labels:
        {{- include "binarylane-controller.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: vip-manager
    spec:
      serviceAccountName: {{ include "binarylane-controller.fullname" . }}-vip
      hostNetwork: true
      {{- with .Values.vipManager.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.vipManager.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      {{- if .Values.vipManager.podSpec }}
        {{- toYaml .Values.vipManager.podSpec | nindent 8 }}
      {{- else }}
        - name: vip-manager
          image: {{ .Values.vipManager.image | default "alpine:3" }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              apk add --no-cache -q jq
              IFACE="${VIP_INTERFACE:-eth0}"
              INTERVAL="${VIP_INTERVAL:-30}"
              LB_CLASS="{{ .Values.vipManager.loadBalancerClass | default "binarylane.com.au/load-balancer" }}"
              APISERVER="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"
              CA=/var/run/secrets/kubernetes.io/serviceaccount/ca.crt

              get_token() { cat /var/run/secrets/kubernetes.io/serviceaccount/token; }

              while true; do
                DESIRED=$(wget -qO- --ca-certificate="$CA" \
                  --header="Authorization: Bearer $(get_token)" \
                  "${APISERVER}/api/v1/services" 2>/dev/null \
                  | jq -r --arg class "$LB_CLASS" '
                    [.items[]
                     | select(.spec.type == "LoadBalancer")
                     | select(.spec.loadBalancerClass == $class or .spec.loadBalancerClass == null)
                     | .status.loadBalancer.ingress[]?.ip // empty
                    ] | unique | .[]' 2>/dev/null)

                CURRENT=$(ip -4 addr show dev "$IFACE" scope global \
                  | grep -oE 'inet [0-9.]+/32' | grep -oE '[0-9.]+' | sort -u)

                for vip in $DESIRED; do
                  if ! echo "$CURRENT" | grep -qx "$vip"; then
                    echo "adding $vip/32 to $IFACE"
                    ip addr add "$vip/32" dev "$IFACE" 2>/dev/null || true
                  fi
                done

                PRIMARY=$(ip -4 addr show dev "$IFACE" scope global \
                  | grep -oE 'inet [0-9.]+/' | grep -v /32 | grep -oE '[0-9.]+' | head -1)
                for vip in $CURRENT; do
                  [ "$vip" = "$PRIMARY" ] && continue
                  if ! echo "$DESIRED" | grep -qx "$vip"; then
                    echo "removing stale $vip/32 from $IFACE"
                    ip addr del "$vip/32" dev "$IFACE" 2>/dev/null || true
                  fi
                done

                sleep "$INTERVAL"
              done
          env:
            - name: VIP_INTERFACE
              value: {{ .Values.vipManager.interface | default "eth0" | quote }}
            - name: VIP_INTERVAL
              value: {{ .Values.vipManager.interval | default "30" | quote }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 32Mi
      {{- end }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-vip
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: vip-manager
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-vip
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: vip-manager
rules:
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "binarylane-controller.fullname" . }}-vip
  labels:
    {{- include "binarylane-controller.labels" . | nindent 4 }}
    app.kubernetes.io/component: vip-manager
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "binarylane-controller.fullname" . }}-vip
subjects:
  - kind: ServiceAccount
    name: {{ include "binarylane-controller.fullname" . }}-vip
    namespace: {{ .Release.Namespace }}
{{- end }}
