apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "binarylane-controllers.fullname" . }}
  labels:
    {{- include "binarylane-controllers.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list", "watch", "update", "patch", "delete", "create"]
  - apiGroups: [""]
    resources: ["nodes/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["services"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: [""]
    resources: ["services/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["blc.samcday.com"]
    resources: ["autoscalinggroups"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["blc.samcday.com"]
    resources: ["autoscalinggroups/status"]
    verbs: ["get", "update", "patch"]
