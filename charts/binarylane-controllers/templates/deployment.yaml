apiVersion: apps/v1
kind: Deployment
{{- $tlsEnabled := or (and .Values.autoscaler.enabled .Values.mtls.enabled) (and .Values.externalDns.enabled .Values.externalDns.mtls.enabled) }}
metadata:
  name: {{ include "binarylane-controllers.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "binarylane-controllers.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "binarylane-controllers.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- if $tlsEnabled }}
        checksum/mtls: {{ include (print $.Template.BasePath "/mtls.yaml") . | sha256sum }}
        {{- end }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        {{- include "binarylane-controllers.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "binarylane-controllers.serviceAccountName" . }}
      containers:
        - name: controller
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: BL_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "binarylane-controllers.secretName" . }}
                  key: {{ .Values.existingSecretKey }}
            - name: CONTROLLERS
              value: {{ .Values.controllers | quote }}
            {{- if .Values.autoscaler.enabled }}
            - name: CLUSTER_AUTOSCALER_SERVICE
              value: "true"
            {{- end }}
            {{- if .Values.externalDns.enabled }}
            - name: EXTERNAL_DNS_WEBHOOK
              value: "true"
            {{- end }}
            - name: NAMESPACE
              value: {{ .Values.namespace | default .Release.Namespace | quote }}
            {{- if .Values.autoscaler.enabled }}
            - name: GRPC_LISTEN_ADDR
              value: {{ .Values.autoscaler.listenAddr | quote }}
            {{- end }}
            {{- if .Values.externalDns.enabled }}
            - name: EXTERNAL_DNS_LISTEN_ADDR
              value: {{ .Values.externalDns.listenAddr | quote }}
            {{- end }}
            {{- if $tlsEnabled }}
            - name: TLS_CERT_PATH
              value: /etc/binarylane-controller/tls/tls.crt
            - name: TLS_KEY_PATH
              value: /etc/binarylane-controller/tls/tls.key
            - name: TLS_CA_PATH
              value: /etc/binarylane-controller/tls/ca.crt
            {{- end }}
            {{- with .Values.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          {{- if or .Values.autoscaler.enabled .Values.externalDns.enabled }}
          ports:
            {{- if .Values.autoscaler.enabled }}
            - name: autoscaler
              containerPort: {{ include "binarylane-controllers.port" .Values.autoscaler.listenAddr }}
              protocol: TCP
            {{- end }}
            {{- if .Values.externalDns.enabled }}
            - name: external-dns
              containerPort: {{ include "binarylane-controllers.port" .Values.externalDns.listenAddr }}
              protocol: TCP
            {{- end }}
          {{- end }}
          {{- if $tlsEnabled }}
          volumeMounts:
            - name: tls
              mountPath: /etc/binarylane-controller/tls
              readOnly: true
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if $tlsEnabled }}
      volumes:
        - name: tls
          secret:
            secretName: {{ include "binarylane-controllers.fullname" . }}-mtls-server
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
