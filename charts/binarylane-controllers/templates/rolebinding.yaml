apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "binarylane-controllers.fullname" . }}-secrets
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "binarylane-controllers.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "binarylane-controllers.fullname" . }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "binarylane-controllers.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
{{- range .Values.secretNamespaces }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "binarylane-controllers.fullname" $ }}-secrets
  namespace: {{ . }}
  labels:
    {{- include "binarylane-controllers.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "binarylane-controllers.fullname" $ }}-secrets
subjects:
  - kind: ServiceAccount
    name: {{ include "binarylane-controllers.serviceAccountName" $ }}
    namespace: {{ $.Release.Namespace }}
{{- end }}
